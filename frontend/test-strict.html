<!DOCTYPE html>
<html>
<body>
<div class="owl-carousel" data-filters=".filters">
  <div class="recipes">Item 1</div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
// Mock main.js behavior
var $carousel = $('.owl-carousel');
var filters = $carousel.data('filters');
if (filters) {
  $carousel.after($carousel.clone().addClass('owl-carousel-filter-cloned'));
}
$carousel.wrapInner('<div class="owl-stage"></div>'); // mock owl init

// Second init
if (filters) {
  $carousel.after($carousel.clone().addClass('owl-carousel-filter-cloned'));
}
console.log("Next sibling classes:", $carousel.next().attr('class'));
console.log("Direct children of next clone:", $carousel.next().children().prop('class'));
</script>
</body>
</html>
